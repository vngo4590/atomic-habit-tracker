apiVersion: v1
kind: Service
metadata:
  name: atomicly-web
  namespace: atomicly-local
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: atomicly-web
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atomicly-web
  namespace: atomicly-local
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: atomicly-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atomicly-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: atomicly:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: AUTH_URL
              value: http://localhost:30080
            - name: NEXT_PUBLIC_APP_URL
              value: http://localhost:30080
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: atomicly-secrets
                  key: database-url
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: atomicly-secrets
                  key: auth-secret
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
