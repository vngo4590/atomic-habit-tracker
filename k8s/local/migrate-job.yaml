apiVersion: batch/v1
kind: Job
metadata:
  name: atomicly-migrate
  namespace: atomicly-local
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atomicly-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: atomicly-migrator:local
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: atomicly-secrets
                  key: database-url
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
