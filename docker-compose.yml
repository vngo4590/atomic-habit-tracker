services:
  postgres:
    image: postgres:17-alpine
    container_name: atomicly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atomicly
    ports:
      - "55432:5432"
    volumes:
      - atomicly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atomicly"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  atomicly-postgres-data:
