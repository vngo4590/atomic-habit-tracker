name: CI / CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      imageTag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'dev-latest'

# ---------------------------------------------------------------------------
# OIDC permissions — required for passwordless Azure login from GitHub Actions.
# ---------------------------------------------------------------------------
permissions:
  id-token: write
  contents: read

env:
  LOCATION: australiaeast
  ENVIRONMENT: dev

jobs:
  # -------------------------------------------------------------------------
  # VALIDATE — run the same checks that developers run locally so we never
  # deploy broken code.
  # -------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    # Prevent the entire job from hanging if any step stalls.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 5

      - name: Generate Prisma client
        run: npm run prisma:generate
        timeout-minutes: 2

      - name: TypeScript check
        run: npm run typecheck
        timeout-minutes: 5

      - name: Lint
        run: npm run lint:app
        timeout-minutes: 5

      - name: Run tests
        run: npm run test:run
        timeout-minutes: 5

      - name: Build application
        run: npm run build
        timeout-minutes: 10

  # -------------------------------------------------------------------------
  # DEPLOY — provision Azure infrastructure and release the container.
  # Only runs on the master branch after validation passes.
  # -------------------------------------------------------------------------
  deploy:
    needs: [validate]
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: dev
    # -----------------------------------------------------------------------
    # Serialise deploys on master. When multiple PRs merge in quick
    # succession, GitHub Actions would otherwise start parallel deploy jobs
    # that race on the same Azure resources (ACR push, Bicep deployment,
    # App Service container update, DB migrations, Front Door endpoint).
    # Using a shared concurrency group with cancel-in-progress=false makes
    # later runs queue behind any in-flight deploy and execute one at a time.
    # The group is keyed on the workflow + ref so master deploys serialise
    # against each other, while workflow_dispatch runs against other refs
    # still get their own queue.
    # -----------------------------------------------------------------------
    concurrency:
      group: deploy-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Derive image tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.imageTag }}" ]; then
            echo "tag=${{ github.event.inputs.imageTag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Pre-create ACR
        run: |
          RG="rg-atomicly-dev-aue-${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          ACR="cratomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          az group create --name "$RG" --location ${{ env.LOCATION }} --output none
          az acr create --resource-group "$RG" --name "$ACR" --sku Basic --location ${{ env.LOCATION }} --output none

      - name: Login to Azure Container Registry
        run: |
          az acr login --name cratomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push runner image
        run: |
          ACR_LOGIN_SERVER="cratomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}.azurecr.io"
          # NOTE: The actual Front Door hostname is auto-generated by Azure and
          # includes a unique hash suffix. We query it after Bicep deployment.
          # NEXT_PUBLIC_APP_URL is not currently used in client-side code, so
          # the placeholder is acceptable for the build stage.
          docker build \
            --target runner \
            --tag "$ACR_LOGIN_SERVER/atomicly:${{ steps.vars.outputs.tag }}" \
            --tag "$ACR_LOGIN_SERVER/atomicly:dev-latest" \
            --build-arg NEXT_PUBLIC_APP_URL="https://placeholder.azurefd.net" \
            --build-arg DEPLOYMENT_VERSION="${{ steps.vars.outputs.tag }}" \
            --cache-to type=inline \
            --cache-from type=inline \
            --push \
            .

      - name: Build and push migrator image
        run: |
          ACR_LOGIN_SERVER="cratomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}.azurecr.io"
          docker build \
            --target migrator \
            --tag "$ACR_LOGIN_SERVER/atomicly-migrator:${{ steps.vars.outputs.tag }}" \
            --tag "$ACR_LOGIN_SERVER/atomicly-migrator:dev-latest" \
            --push \
            .

      - name: Deploy infrastructure (Bicep)
        id: bicep
        run: |
          DEPLOY_OUTPUTS=$(az deployment sub create \
            --name "atomicly-${{ env.ENVIRONMENT }}-${{ github.run_id }}" \
            --location ${{ env.LOCATION }} \
            --template-file infra/main.bicep \
            --parameters \
              location=${{ env.LOCATION }} \
              environment=${{ env.ENVIRONMENT }} \
              uniqueSuffix=${{ secrets.AZURE_UNIQUE_SUFFIX }} \
              postgresAdminPassword='${{ secrets.POSTGRES_ADMIN_PASSWORD }}' \
              imageTag=${{ steps.vars.outputs.tag }} \
            --query properties.outputs \
            -o json)
          # NOTE: deployment outputs contain sensitive values (App Insights
          # connection string), so we do NOT echo $DEPLOY_OUTPUTS to the log.
          APP_INSIGHTS_CONNECTION_STRING=$(echo "$DEPLOY_OUTPUTS" | python -c "import json, sys; print(json.load(sys.stdin)['appInsightsConnectionString']['value'])")
          FRONT_DOOR_ID=$(echo "$DEPLOY_OUTPUTS" | python -c "import json, sys; print(json.load(sys.stdin)['frontDoorId']['value'])")
          # Mask both so they can never surface in subsequent step logs.
          echo "::add-mask::$APP_INSIGHTS_CONNECTION_STRING"
          echo "app_insights_connection_string=$APP_INSIGHTS_CONNECTION_STRING" >> "$GITHUB_OUTPUT"
          echo "front_door_id=$FRONT_DOOR_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve actual Front Door hostname
        id: fd
        run: |
          # Bicep cannot return the auto-generated hash suffix at deploy time.
          # Query the REST API to get the real endpoint hostname.
          SUB_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="rg-atomicly-dev-aue-${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          PROFILE="afd-atomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          ENDPOINT="atomicly-dev-${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          ACTUAL_HOSTNAME=$(az rest \
            --method GET \
            --uri "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.Cdn/profiles/${PROFILE}/afdEndpoints/${ENDPOINT}?api-version=2024-09-01" \
            --query "properties.hostName" -o tsv)
          DEPLOYMENT_STATUS=$(az rest \
            --method GET \
            --uri "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.Cdn/profiles/${PROFILE}/afdEndpoints/${ENDPOINT}?api-version=2024-09-01" \
            --query "properties.deploymentStatus" -o tsv)

          APP_HOST=$(az webapp show --name "app-atomicly-dev-aue" --resource-group "$RG" --query defaultHostName -o tsv)

          if [ -n "$ACTUAL_HOSTNAME" ] && [ "$DEPLOYMENT_STATUS" = "Succeeded" ]; then
            echo "hostname=$ACTUAL_HOSTNAME" >> "$GITHUB_OUTPUT"
            echo "public_url=https://${ACTUAL_HOSTNAME}" >> "$GITHUB_OUTPUT"
            echo "Front Door hostname: $ACTUAL_HOSTNAME"
          else
            if [ -n "$ACTUAL_HOSTNAME" ]; then
              echo "WARNING: Front Door endpoint deploymentStatus is '${DEPLOYMENT_STATUS}'. Falling back to App Service URL."
            else
              echo "WARNING: Could not resolve Front Door hostname. Falling back to App Service URL."
            fi
            echo "hostname=$APP_HOST" >> "$GITHUB_OUTPUT"
            echo "public_url=https://${APP_HOST}" >> "$GITHUB_OUTPUT"
            echo "App Service URL: https://${APP_HOST}"
          fi

      - name: Update Key Vault secrets
        run: |
          KV_NAME="kv-atomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          DB_URL="postgresql://psqladmin:${{ secrets.POSTGRES_ADMIN_PASSWORD }}@psql-atomicly-dev-aue-${{ secrets.AZURE_UNIQUE_SUFFIX }}.postgres.database.azure.com:5432/atomicly?schema=public&sslmode=require"
          az keyvault secret set --vault-name "$KV_NAME" --name database-url --value "$DB_URL"
          az keyvault secret set --vault-name "$KV_NAME" --name auth-secret --value '${{ secrets.AUTH_SECRET }}'

      - name: Grant App Service access to ACR and Key Vault
        run: |
          APP_NAME="app-atomicly-dev-aue"
          RG="rg-atomicly-dev-aue-${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          ACR="cratomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          KV_NAME="kv-atomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          APP_PRINCIPAL_ID=$(az webapp show --name "$APP_NAME" --resource-group "$RG" --query identity.principalId -o tsv)
          az role assignment create --assignee "$APP_PRINCIPAL_ID" --role AcrPull --scope $(az acr show --name "$ACR" --resource-group "$RG" --query id -o tsv) --output none 2>/dev/null || true
          az role assignment create --assignee "$APP_PRINCIPAL_ID" --role "Key Vault Secrets User" --scope $(az keyvault show --name "$KV_NAME" --resource-group "$RG" --query id -o tsv) --output none 2>/dev/null || true

      - name: Update App Service app settings
        run: |
          APP_NAME="app-atomicly-dev-aue"
          RG="rg-atomicly-dev-aue-${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          KV_NAME="kv-atomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          ACR_LOGIN_SERVER="cratomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}.azurecr.io"
          FD_URL="https://${{ steps.fd.outputs.hostname }}"
          KV_URL="https://${KV_NAME}.vault.azure.net"
          az webapp config appsettings set \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --settings \
              "NODE_ENV=production" \
              "HOSTNAME=0.0.0.0" \
              "PORT=3000" \
              "AUTH_URL=$FD_URL" \
              "NEXT_PUBLIC_APP_URL=$FD_URL" \
              "DEPLOYMENT_VERSION=${{ steps.vars.outputs.tag }}" \
              "APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.bicep.outputs.app_insights_connection_string }}" \
              "DATABASE_URL=@Microsoft.KeyVault(SecretUri=${KV_URL}/secrets/database-url/)" \
              "AUTH_SECRET=@Microsoft.KeyVault(SecretUri=${KV_URL}/secrets/auth-secret/)"

      - name: Update App Service container image
        run: |
          APP_NAME="app-atomicly-dev-aue"
          RG="rg-atomicly-dev-aue-${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          ACR_LOGIN_SERVER="cratomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}.azurecr.io"
          az webapp config container set \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --docker-custom-image-name "$ACR_LOGIN_SERVER/atomicly:${{ steps.vars.outputs.tag }}" \
            --docker-registry-server-url "https://$ACR_LOGIN_SERVER"

      - name: Pin App Service ingress to our Front Door (X-Azure-FDID)
        run: |
          # The Bicep template already denies inbound traffic that does not come
          # from the AzureFrontDoor.Backend service tag. That blocks the public
          # internet, but ANY Azure Front Door could still reach us. Here we add
          # an X-Azure-FDID header match so only OUR Front Door instance passes.
          # This runs post-deploy because the Front Door ID is only known after
          # the Front Door is created (avoids a Bicep circular dependency).
          APP_NAME="app-atomicly-dev-aue"
          RG="rg-atomicly-dev-aue-${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          FDID="${{ steps.bicep.outputs.front_door_id }}"
          # Remove any stale rule from a previous run so the update is idempotent.
          az webapp config access-restriction remove \
            --name "$APP_NAME" --resource-group "$RG" \
            --rule-name "Allow-OurFrontDoor" --scm-site false --output none 2>/dev/null || true
          az webapp config access-restriction add \
            --name "$APP_NAME" --resource-group "$RG" \
            --rule-name "Allow-OurFrontDoor" \
            --priority 90 \
            --action Allow \
            --service-tag AzureFrontDoor.Backend \
            --http-header x-azure-fdid="$FDID" \
            --scm-site false \
            --output none

      - name: Run database migrations
        run: |
          RG="rg-atomicly-dev-aue-${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          POSTGRES_NAME="psql-atomicly-dev-aue-${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          ACR_LOGIN_SERVER="cratomiclydev${{ secrets.AZURE_UNIQUE_SUFFIX }}.azurecr.io"
          DB_URL="postgresql://psqladmin:${{ secrets.POSTGRES_ADMIN_PASSWORD }}@${POSTGRES_NAME}.postgres.database.azure.com:5432/atomicly?schema=public&sslmode=require"
          # Add GitHub Actions runner IP to PostgreSQL firewall temporarily
          RUNNER_IP=$(curl -s https://api.ipify.org)
          az postgres flexible-server firewall-rule create \
            --name "$POSTGRES_NAME" \
            --resource-group "$RG" \
            --rule-name "github-actions" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP" \
            --output none
          # Run migrations via the migrator image
          docker run --rm -e "DATABASE_URL=$DB_URL" -e "NODE_ENV=production" "${ACR_LOGIN_SERVER}/atomicly-migrator:dev-latest"
          # Clean up firewall rule
          az postgres flexible-server firewall-rule delete \
            --name "$POSTGRES_NAME" \
            --resource-group "$RG" \
            --rule-name "github-actions" \
            --yes \
            --output none

      - name: Verify deployment
        run: |
          APP_NAME="app-atomicly-dev-aue"
          RG="rg-atomicly-dev-aue-${{ secrets.AZURE_UNIQUE_SUFFIX }}"
          PUBLIC_URL="https://${{ steps.fd.outputs.hostname }}"
          HOSTNAME=$(az webapp show --name "$APP_NAME" --resource-group "$RG" --query defaultHostName -o tsv)
          echo "Testing App Service: https://$HOSTNAME/api/healthz"
          for i in {1..12}; do
            if curl -sf "https://$HOSTNAME/api/healthz" > /dev/null 2>&1; then
              echo "✅ App Service health check passed"
              break
            fi
            echo "  Waiting for app to be healthy ..."
            sleep 10
          done
          echo "Testing public URL: $PUBLIC_URL/api/healthz"
          if curl -sf "$PUBLIC_URL/api/healthz" > /dev/null 2>&1; then
            echo "✅ Public URL health check passed"
          else
            echo "⚠️  Public URL health check failed"
          fi
